name: Kensa Released

# Triggered by kensa-dev/kensa publish.yml after a successful Kensa release.
# Bumps `kensa-core-version.txt` (the *default* kensa-core the plugin targets), verifies
# the build still passes, and commits the bump. No plugin release is auto-staged — the
# plugin versions independently. A maintainer decides if a plugin release is warranted.

on:
  repository_dispatch:
    types: [kensa-released]

permissions:
  contents: write

env:
  KENSA_VERSION: ${{ github.event.client_payload.version }}

jobs:
  verify-against-kensa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: master
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v6

      - name: Pin default kensa-core to new release
        run: echo "${KENSA_VERSION}" > kensa-core-version.txt

      - name: Verify build against new kensa-core
        run: ./gradlew check --no-daemon

      - name: Commit version bump
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add kensa-core-version.txt
          if git diff --cached --quiet; then
            echo "kensa-core-version.txt already at ${KENSA_VERSION}; nothing to commit."
          else
            git commit -m "Bump default kensa-core to ${KENSA_VERSION}"
            git push origin HEAD:master
          fi
